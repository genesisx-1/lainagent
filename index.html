<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agent Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: #ccc;
      user-select: none;
    }
    #office-container {
      flex: 0 0 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2a2a4a;
      border-radius: 6px;
      cursor: pointer;
    }
    #status-bar {
      color: #555; font-size: 10px; margin-top: 6px; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    #status-bar button {
      background: #222244; border: 1px solid #333; color: #888;
      font-size: 9px; padding: 2px 8px; border-radius: 3px; cursor: pointer;
      font-family: inherit;
    }
    #status-bar button:hover { background: #333366; color: #aaa; }
    #status-bar button.active-btn { background: #334433; color: #0f8; border-color: #0f8; }
    #clock {
      position: absolute; top: 10px; left: 12px;
      color: rgba(255,255,255,0.12); font-size: 10px;
    }
    #minimap {
      position: absolute; bottom: 32px; right: 8px;
      border: 1px solid #333; border-radius: 3px;
      image-rendering: pixelated;
    }
    #room-nav {
      position: absolute; bottom: 32px; left: 12px;
      display: flex; gap: 4px;
    }
    #room-nav button {
      background: #1a1a2e; border: 1px solid #333; color: #666;
      font-size: 9px; padding: 3px 8px; border-radius: 3px; cursor: pointer;
      font-family: inherit;
    }
    #room-nav button:hover { background: #222244; color: #aaa; }
    #room-nav button.active-room { background: #2a2a5a; color: #aaa; border-color: #4a4a8a; }
    #panel {
      flex: 1; display: flex; flex-direction: column;
      border-left: 2px solid #1a1a2e; background: #111122; min-width: 400px;
    }
    #agent-cards {
      display: flex; flex-direction: column; gap: 2px; padding: 8px;
      border-bottom: 1px solid #1a1a2e;
    }
    .agent-card {
      display: flex; align-items: center; gap: 6px; padding: 5px 8px;
      border-radius: 4px; background: #1a1a2e; cursor: pointer;
      transition: background 0.2s; font-size: 11px;
    }
    .agent-card:hover { background: #222244; }
    .agent-card.selected { background: #2a2a5a; border: 1px solid #4a4a8a; }
    .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-dot.active { box-shadow: 0 0 6px currentColor; animation: pd 2s infinite; }
    @keyframes pd { 0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 10px currentColor} }
    .agent-card-name { font-weight: bold; width: 50px; }
    .agent-card-dept { font-size: 8px; opacity: 0.5; width: 52px; }
    .agent-card-status { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#666; }
    .agent-card-status.active-status { color: #0f8; }
    .agent-card-cpu { color:#555; font-size:9px; width:30px; text-align:right; }
    .agent-card-uptime { color:#555; font-size:9px; width:45px; text-align:right; }
    #tab-bar { display:flex; border-bottom:1px solid #1a1a2e; }
    .tab {
      flex:1; padding:5px 0; text-align:center; font-size:9px; color:#555;
      cursor:pointer; border-bottom:2px solid transparent;
      text-transform:uppercase; letter-spacing:1px;
    }
    .tab:hover { color:#888; }
    .tab.active { color:#aaa; border-bottom-color:#4a4a8a; }
    #tab-content { flex:1; overflow:hidden; position:relative; }
    .tab-panel { position:absolute; inset:0; overflow-y:auto; padding:8px; display:none; }
    .tab-panel.visible { display:block; }
    .tab-panel::-webkit-scrollbar { width:4px; }
    .tab-panel::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
    .feed-entry {
      padding:3px 6px; margin-bottom:2px; border-radius:3px; font-size:10px;
      line-height:1.4; background:rgba(255,255,255,0.02); border-left:2px solid #333;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1} }
    .feed-time { color:#444; margin-right:6px; }
    .feed-agent { font-weight:bold; margin-right:4px; }
    .feed-text { color:#888; }
    .terminal-view { background:#0a0a14; border:1px solid #1a1a2e; border-radius:4px; margin-bottom:6px; overflow:hidden; }
    .terminal-header { display:flex; align-items:center; gap:6px; padding:3px 8px; background:#151528; font-size:10px; color:#666; }
    .terminal-header-dot { width:6px; height:6px; border-radius:50%; }
    .terminal-body { padding:4px 8px; font-size:9px; line-height:1.4; color:#5a5a7a; max-height:100px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
    .terminal-body .cmd { color:#0f8; } .terminal-body .output { color:#888; }
    .stat-row { display:flex; justify-content:space-between; padding:3px 0; font-size:10px; border-bottom:1px solid rgba(255,255,255,0.03); }
    .stat-label { color:#555; } .stat-value { color:#aaa; }
    .stat-bar-c { width:80px; height:6px; background:#1a1a2e; border-radius:3px; overflow:hidden; margin-top:3px; }
    .stat-bar { height:100%; border-radius:3px; transition:width 0.5s ease; }
    .toast {
      position:fixed; top:12px; right:12px; background:#222244; border:1px solid #4a4a8a;
      border-radius:6px; padding:8px 14px; font-size:11px; color:#ccc; z-index:100;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; pointer-events:none;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(-10px)} }
    @keyframes toastOut { to{opacity:0;transform:translateY(-10px)} }
    #inspector {
      display:none; position:absolute; background:rgba(10,10,20,0.95);
      border:1px solid #4a4a8a; border-radius:8px; padding:12px; z-index:50;
      width:320px; max-height:400px; overflow-y:auto; font-size:11px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }
    #inspector h3 { margin-bottom:8px; font-size:13px; }
    #inspector .close-btn { position:absolute; top:8px; right:10px; cursor:pointer; color:#666; font-size:14px; }
    #inspector .close-btn:hover { color:#fff; }
    .inspector-section { margin-bottom:6px; padding:5px; background:rgba(255,255,255,0.03); border-radius:4px; }
    .inspector-label { color:#666; font-size:9px; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
    .inspector-value { color:#aaa; }
    .inspector-terminal { background:#0a0a14; padding:5px; border-radius:3px; font-size:9px; color:#0f8; max-height:120px; overflow-y:auto; white-space:pre-wrap; }
    /* Context menu */
    #ctx-menu {
      display:none; position:absolute; background:#1a1a2e; border:1px solid #4a4a8a;
      border-radius:6px; padding:4px 0; z-index:60; min-width:160px;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);
    }
    #ctx-menu .ctx-item {
      padding:6px 14px; font-size:11px; color:#aaa; cursor:pointer;
    }
    #ctx-menu .ctx-item:hover { background:#2a2a5a; color:#fff; }
    #ctx-menu .ctx-sep { border-top:1px solid #2a2a4a; margin:2px 0; }
    /* Timeline */
    .timeline-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .timeline-label { width:50px; font-size:10px; font-weight:bold; }
    .timeline-bar { flex:1; height:14px; background:#1a1a2e; border-radius:3px; overflow:hidden; position:relative; }
    .timeline-segment { position:absolute; height:100%; border-radius:2px; opacity:0.7; }
    /* Kanban */
    .kanban { display:flex; gap:6px; height:100%; }
    .kanban-col { flex:1; background:#1a1a2e; border-radius:4px; padding:6px; display:flex; flex-direction:column; }
    .kanban-title { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#666; margin-bottom:6px; text-align:center; }
    .kanban-item {
      background:#222244; border-radius:3px; padding:5px 8px; margin-bottom:4px;
      font-size:10px; border-left:2px solid #555; cursor:grab;
    }
    .kanban-item:active { cursor:grabbing; }
    .kanban-add {
      margin-top:auto; text-align:center; font-size:9px; color:#444;
      cursor:pointer; padding:4px; border-radius:3px;
    }
    .kanban-add:hover { background:#222244; color:#888; }
    /* Automation panel */
    .auto-section { margin-bottom:10px; }
    .auto-header { font-size:10px; color:#666; padding:4px 0; border-bottom:1px solid #1a1a2e; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
    .auto-toggle { display:flex; align-items:center; gap:6px; font-size:10px; cursor:pointer; }
    .auto-toggle input { cursor:pointer; }
    .auto-status { padding:6px 8px; background:#1a1a2e; border-radius:4px; font-size:10px; margin-bottom:6px; }
    .auto-status .commander { color:#0f8; font-weight:bold; }
    .auto-btn {
      background:#222244; border:1px solid #333; color:#aaa; font-size:10px;
      padding:5px 10px; border-radius:4px; cursor:pointer; font-family:inherit;
      width:100%; margin-bottom:4px; text-align:left;
    }
    .auto-btn:hover { background:#333366; color:#fff; border-color:#4a4a8a; }
    .auto-btn.danger { border-color:#633; }
    .auto-btn.danger:hover { background:#442222; border-color:#a44; }
    .auto-input {
      background:#1a1a2e; border:1px solid #333; color:#aaa; font-size:10px;
      padding:5px 8px; border-radius:4px; font-family:inherit; width:100%;
      margin-bottom:4px;
    }
    .auto-input:focus { outline:none; border-color:#4a4a8a; }
    .auto-queue-item {
      display:flex; align-items:center; gap:6px; padding:4px 6px;
      background:rgba(255,255,255,0.02); border-radius:3px; margin-bottom:3px;
      font-size:10px; border-left:2px solid #333;
    }
    .auto-queue-item .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .chain-viz {
      display:flex; align-items:center; gap:4px; padding:8px;
      background:#1a1a2e; border-radius:4px; margin-bottom:8px; font-size:10px;
    }
    .chain-node {
      padding:4px 8px; border-radius:3px; font-weight:bold; font-size:9px;
      position:relative;
    }
    .chain-node.active-commander { box-shadow:0 0 8px currentColor; }
    .chain-arrow { color:#444; }
    .workflow-item {
      background:#1a1a2e; border-radius:4px; padding:6px 8px;
      margin-bottom:4px; font-size:10px;
      display:flex; align-items:center; gap:6px;
    }
    .workflow-item select, .workflow-item input {
      background:#222; border:1px solid #333; color:#aaa; font-size:9px;
      padding:2px 4px; border-radius:2px; font-family:inherit;
    }
    /* CRM */
    .crm-section { margin-bottom:10px; }
    .crm-header { font-size:10px; color:#666; padding:4px 0; border-bottom:1px solid #1a1a2e; margin-bottom:6px; display:flex; justify-content:space-between; }
    .crm-card {
      background:#1a1a2e; border-radius:4px; padding:6px 8px; margin-bottom:4px;
      font-size:10px; border-left:2px solid #4285f4;
    }
    .crm-card .name { color:#aaa; font-weight:bold; }
    .crm-card .meta { color:#555; font-size:9px; margin-top:2px; }
    .crm-input {
      background:#1a1a2e; border:1px solid #333; color:#aaa; font-size:10px;
      padding:5px 8px; border-radius:4px; font-family:inherit; width:100%; margin-bottom:4px;
    }
    .crm-input:focus { outline:none; border-color:#4a4a8a; }
    .crm-badge {
      display:inline-block; font-size:8px; padding:1px 5px; border-radius:8px;
      background:#222244; color:#888; margin-left:4px;
    }
    .scrape-result {
      background:#1a1a2e; border-radius:4px; padding:6px 8px; margin-bottom:4px;
      font-size:10px; border-left:2px solid #10a37f;
    }
    .scrape-result .title { color:#aaa; font-weight:bold; }
    .scrape-result .url { color:#4285f4; font-size:9px; word-break:break-all; }
    .scrape-result .excerpt { color:#666; font-size:9px; margin-top:2px; max-height:40px; overflow:hidden; }
    /* Scripts */
    .script-editor {
      background:#0a0a14; border:1px solid #1a1a2e; border-radius:4px;
      margin-bottom:6px; overflow:hidden;
    }
    .script-editor textarea {
      width:100%; min-height:80px; background:#0a0a14; color:#0f8;
      border:none; padding:6px 8px; font-family:inherit; font-size:10px;
      resize:vertical;
    }
    .script-editor textarea:focus { outline:none; }
    .script-output {
      background:#0a0a14; padding:6px 8px; font-size:9px; color:#888;
      max-height:100px; overflow-y:auto; white-space:pre-wrap;
      border-top:1px solid #1a1a2e;
    }
    .msg-bubble {
      background:#1a1a2e; border-radius:4px; padding:5px 8px; margin-bottom:3px;
      font-size:10px;
    }
    .msg-bubble .from { font-weight:bold; margin-right:4px; }
    /* Daemon controls */
    .daemon-section { margin-bottom: 10px; }
    .daemon-card {
      background: #1a1a2e; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
      border-left: 3px solid #333;
    }
    .daemon-card.running { border-left-color: #0f8; }
    .daemon-card .daemon-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .daemon-card .daemon-name { font-weight: bold; font-size: 11px; }
    .daemon-card .daemon-status { font-size: 9px; margin-left: auto; }
    .daemon-card .daemon-status.on { color: #0f8; }
    .daemon-card .daemon-status.off { color: #555; }
    .daemon-toggle {
      position: relative; width: 32px; height: 16px; background: #333;
      border-radius: 8px; cursor: pointer; flex-shrink: 0;
    }
    .daemon-toggle.on { background: #0a6b3f; }
    .daemon-toggle .knob {
      position: absolute; top: 2px; left: 2px; width: 12px; height: 12px;
      background: #888; border-radius: 50%; transition: all 0.2s;
    }
    .daemon-toggle.on .knob { left: 18px; background: #0f8; }
    .daemon-task-input {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .daemon-task-input input {
      flex: 1; background: #111; border: 1px solid #333; color: #aaa;
      padding: 5px 8px; border-radius: 4px; font-family: inherit; font-size: 10px;
    }
    .daemon-task-input input:focus { outline: none; border-color: #4a4a8a; }
    .daemon-task-input button {
      background: #222244; border: 1px solid #333; color: #aaa;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 10px;
    }
    .daemon-task-input button:hover { background: #333366; color: #fff; }
    .daemon-queue-item {
      display: flex; align-items: center; gap: 6px; padding: 3px 6px;
      background: rgba(255,255,255,0.02); border-radius: 3px; margin-top: 3px;
      font-size: 9px; color: #888;
    }
    .daemon-queue-item .dq-status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .daemon-queue-item .dq-remove {
      margin-left: auto; color: #555; cursor: pointer; font-size: 10px;
    }
    .daemon-queue-item .dq-remove:hover { color: #f55; }
    .daemon-log {
      background: #0a0a14; border-radius: 4px; padding: 4px 8px; margin-top: 6px;
      max-height: 80px; overflow-y: auto; font-size: 9px; color: #555;
      white-space: pre-wrap;
    }
    .daemon-log::-webkit-scrollbar { width: 3px; }
    .daemon-log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .daemon-schedule {
      background: #1a1a2e; border-radius: 4px; padding: 6px 8px; margin-bottom: 4px;
      font-size: 10px; display: flex; align-items: center; gap: 6px;
    }
    .daemon-schedule .sched-active { color: #0f8; }
    .daemon-schedule .sched-inactive { color: #555; }
    /* Chat panels */
    .chat-panel {
      position: fixed; width: 380px; height: 420px;
      background: #0d0d1a; border: 2px solid #333;
      border-radius: 8px; z-index: 200; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7); overflow: hidden;
      resize: both; min-width: 300px; min-height: 250px;
    }
    .chat-panel-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      cursor: grab; user-select: none; flex-shrink: 0;
    }
    .chat-panel-header:active { cursor: grabbing; }
    .chat-panel-header .dot { width: 10px; height: 10px; border-radius: 50%; }
    .chat-panel-header .title { font-size: 12px; font-weight: bold; flex: 1; }
    .chat-panel-header .status-text { font-size: 9px; color: #555; }
    .chat-panel-header .close { cursor: pointer; color: #666; font-size: 16px; padding: 0 4px; }
    .chat-panel-header .close:hover { color: #fff; }
    .chat-panel-body {
      flex: 1; overflow-y: auto; padding: 8px; font-size: 11px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .chat-panel-body::-webkit-scrollbar { width: 4px; }
    .chat-panel-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .chat-msg {
      padding: 6px 10px; border-radius: 6px; max-width: 90%; line-height: 1.4;
      word-wrap: break-word; white-space: pre-wrap; animation: fadeIn 0.2s ease;
    }
    .chat-msg.user {
      background: #1a2a3a; color: #8cf; align-self: flex-end; border-bottom-right-radius: 2px;
    }
    .chat-msg.agent {
      background: #1a1a2e; color: #ccc; align-self: flex-start; border-bottom-left-radius: 2px;
    }
    .chat-msg.system { background: none; color: #444; font-size: 9px; align-self: center; }
    .chat-msg.agent .agent-label { font-weight: bold; font-size: 10px; margin-bottom: 2px; }
    .chat-panel-input {
      display: flex; gap: 4px; padding: 8px; border-top: 1px solid #1a1a2e; flex-shrink: 0;
    }
    .chat-panel-input input {
      flex: 1; background: #1a1a2e; border: 1px solid #333; color: #ccc;
      padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 11px;
    }
    .chat-panel-input input:focus { outline: none; border-color: #4a4a8a; }
    .chat-panel-input input:disabled { opacity: 0.5; }
    .chat-panel-input button {
      background: #222244; border: 1px solid #333; color: #aaa;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
    }
    .chat-panel-input button:hover { background: #333366; color: #fff; }
    .chat-panel-input button:disabled { opacity: 0.4; cursor: default; }
    .chat-typing {
      padding: 4px 10px; font-size: 10px; color: #555; font-style: italic;
    }
    .chat-typing .dots::after {
      content: '...'; animation: typingDots 1.2s steps(4, end) infinite;
    }
    @keyframes typingDots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  </style>
</head>
<body>
  <div id="office-container">
    <div id="clock"></div>
    <canvas id="canvas"></canvas>
    <canvas id="minimap" width="120" height="80"></canvas>
    <div id="room-nav">
      <button class="active-room" onclick="switchRoom('office')">Office</button>
      <button onclick="switchRoom('server')">Server Room</button>
      <button onclick="switchRoom('break')">Break Room</button>
      <button onclick="switchRoom('datalab')">Data Lab</button>
    </div>
    <div id="status-bar">
      <span id="status-text">Initializing...</span>
      <button id="sound-btn" onclick="toggleSound()">Sound: OFF</button>
      <button onclick="exportLog()">Export Log</button>
    </div>
    <div id="inspector"><span class="close-btn" onclick="closeInspector()">x</span><div id="inspector-content"></div></div>
    <div id="ctx-menu"></div>
  </div>
  <div id="panel">
    <div id="agent-cards"></div>
    <div id="tab-bar">
      <div class="tab active" data-tab="feed" onclick="switchTab('feed')">Feed</div>
      <div class="tab" data-tab="terminals" onclick="switchTab('terminals')">Term</div>
      <div class="tab" data-tab="stats" onclick="switchTab('stats')">Stats</div>
      <div class="tab" data-tab="timeline" onclick="switchTab('timeline')">Timeline</div>
      <div class="tab" data-tab="kanban" onclick="switchTab('kanban')">Tasks</div>
      <div class="tab" data-tab="auto" onclick="switchTab('auto')">Auto</div>
      <div class="tab" data-tab="crm" onclick="switchTab('crm')">CRM</div>
      <div class="tab" data-tab="scripts" onclick="switchTab('scripts')">Scripts</div>
      <div class="tab" data-tab="daemons" onclick="switchTab('daemons')">Agents</div>
    </div>
    <div id="tab-content">
      <div id="panel-feed" class="tab-panel visible"></div>
      <div id="panel-terminals" class="tab-panel"></div>
      <div id="panel-stats" class="tab-panel"></div>
      <div id="panel-timeline" class="tab-panel"></div>
      <div id="panel-kanban" class="tab-panel"></div>
      <div id="panel-auto" class="tab-panel"></div>
      <div id="panel-crm" class="tab-panel"></div>
      <div id="panel-scripts" class="tab-panel"></div>
      <div id="panel-daemons" class="tab-panel"></div>
    </div>
  </div>

<script>
const { execSync, spawn } = require('child_process');
const { Notification } = require('electron').remote || {};
const os = require('os');
const fs = require('fs');
const path = require('path');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const mctx = minimapCanvas.getContext('2d');

// ===== SOUND ENGINE =====
let soundEnabled = false;
let audioCtx = null;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.value = 0.03;
  if (type === 'click') { osc.frequency.value = 800 + Math.random() * 400; gain.gain.value = 0.015; osc.type = 'square'; osc.start(); osc.stop(audioCtx.currentTime + 0.02 + Math.random() * 0.02); }
  else if (type === 'ding') { osc.frequency.value = 880; osc.type = 'sine'; gain.gain.value = 0.05; gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }
  else if (type === 'online') { osc.frequency.value = 523; osc.type = 'sine'; gain.gain.value = 0.04; osc.start(); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4); osc.stop(audioCtx.currentTime + 0.4); }
  else if (type === 'step') { osc.frequency.value = 100 + Math.random() * 60; osc.type = 'triangle'; gain.gain.value = 0.008; osc.start(); osc.stop(audioCtx.currentTime + 0.03); }
  else if (type === 'ambient') {
    // Low office hum
    osc.frequency.value = 55; osc.type = 'sine'; gain.gain.value = 0.005;
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2); osc.stop(audioCtx.currentTime + 2);
  }
}
function toggleSound() {
  soundEnabled = !soundEnabled;
  if (soundEnabled && !audioCtx) initAudio();
  document.getElementById('sound-btn').textContent = `Sound: ${soundEnabled ? 'ON' : 'OFF'}`;
  document.getElementById('sound-btn').classList.toggle('active-btn', soundEnabled);
  if (soundEnabled) playSound('ding');
}

const solid = new Set();
function markSolid(x,y){solid.add(`${x},${y}`);}

  solid.clear();
  furnitureList.forEach(f => {
    if(['desk','whiteboard','bookshelf','couch','rack','bigtable','tv','arcade'].includes(f.type)){
      for(let dx=0;dx<(f.w||1);dx++)for(let dy=0;dy<(f.h||1);dy++)markSolid(f.x+dx,f.y+dy);

      markSolid(f.x,f.y);
    }
  });
  for(let x=0;x<COLS;x++)markSolid(x,0);
}

const TASK_FILE = path.join(os.homedir(), 'agent-office', 'tasks.json');
let taskQueue = { tasks: [], config: { auto_dispatch: true, chain_of_command: ['Claude','Codex','Qwen','Gemini','Cursor'], dispatch_rules: { research:'Gemini', edit:'Cursor', refactor:'Cursor', generate:'Codex', review:'Codex', plan:'Claude', scrape:'Qwen', data:'Qwen', analyze:'Qwen', script:'Qwen', default:'Codex' } } };
let autoDispatchEnabled = true;
let workflows = [];
let dispatchLog = [];

function loadTaskQueue() {
  try { taskQueue = JSON.parse(fs.readFileSync(TASK_FILE, 'utf-8')); } catch(e) { saveTaskQueue(); }
}
function saveTaskQueue() {
  try { fs.writeFileSync(TASK_FILE, JSON.stringify(taskQueue, null, 2)); } catch(e) {}
}
function addTask(title, assignee, priority = 'medium', context = {}) {
  const task = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    title, status: 'todo', assignee: assignee || classifyTask(title),
    priority, created: new Date().toISOString(), completed: null,
    result: '', context,
  };
  taskQueue.tasks.push(task);
  saveTaskQueue();
  addFeedEntry('System', `Task added: "${title}" -> ${task.assignee}`);
  return task;
}
function classifyTask(title) {
  const lower = title.toLowerCase();
  const rules = taskQueue.config.dispatch_rules;
  for (const [keyword, agent] of Object.entries(rules)) {
    if (keyword !== 'default' && lower.includes(keyword)) return agent;
  }
  return rules.default || 'Codex';
}
function getCommander() {
  // Who's in charge? First active agent in chain of command
  const chain = taskQueue.config.chain_of_command;
  for (const name of chain) {
    const agent = agents.find(a => a.name === name);
    if (agent && agent.active) return agent.name;
  }
  return chain[0]; // Default to Claude even if offline
}

// Kanban view built from task queue + daemon tasks
let kanbanTasks = { todo: [], inprogress: [], done: [] };
function syncKanbanFromQueue() {
  kanbanTasks = { todo: [], inprogress: [], done: [] };
  // Tasks from task queue
  taskQueue.tasks.forEach(t => {
    const item = { text: t.title, agent: t.assignee, id: t.id, priority: t.priority, source: 'queue' };
    if (t.status === 'todo') kanbanTasks.todo.push(item);
    else if (t.status === 'inprogress') kanbanTasks.inprogress.push(item);
    else if (t.status === 'done' || t.status === 'failed') kanbanTasks.done.push(item);
  });
  // Tasks from daemon queues
  if (typeof daemonState !== 'undefined') {
    Object.entries(daemonState).forEach(([agentName, state]) => {
      if (!state || !state.tasks) return;
      state.tasks.forEach(t => {
        const item = { text: t.text, agent: agentName, id: 'd_' + t.id, priority: 'medium', source: 'daemon' };
        if (t.status === 'queued') kanbanTasks.todo.push(item);
        else if (t.status === 'running') kanbanTasks.inprogress.push(item);
        else if (t.status === 'done' || t.status === 'failed') kanbanTasks.done.push(item);
      });
    });
  }
}

// ===== AUTO-DISPATCH ENGINE =====
let lastDispatchTime = 0;
function autoDispatch() {
  if (!autoDispatchEnabled) return;
  const commander = getCommander();
  const todoTasks = taskQueue.tasks.filter(t => t.status === 'todo');
  if (todoTasks.length === 0) return;

  todoTasks.forEach(task => {
    const assignee = task.assignee;
    const agent = agents.find(a => a.name === assignee);

    // If the assigned agent is active, dispatch
    if (agent && agent.active) return; // Agent is busy, wait

    // If assigned agent is offline, try to dispatch via CLI
    if (!agent || !agent.active) {
      // Only auto-dispatch if commander is online or we have Codex as fallback
      const codex = agents.find(a => a.name === 'Codex');
      const claude = agents.find(a => a.name === 'Claude');

      if (claude && claude.active) return; // Claude will handle it
      if (codex && codex.active) return; // Codex is handling things

      // No commander online - queue for later
    }
  });
}

function dispatchTaskNow(taskId) {
  const task = taskQueue.tasks.find(t => t.id === taskId);
  if (!task) return;

  task.status = 'inprogress';
  saveTaskQueue();
  addFeedEntry('System', `Dispatching: "${task.title}" to ${task.assignee}`);
  showToast(`Dispatching to ${task.assignee}...`, (agents.find(a=>a.name===task.assignee)||{color:'#888'}).color);

  const cmd = buildDispatchCommand(task);
  if (!cmd) { task.status = 'failed'; task.result = 'No dispatch command'; saveTaskQueue(); return; }

  dispatchLog.push({ time: new Date().toISOString(), task: task.title, agent: task.assignee, cmd });

  try {
    const result = execSync(cmd, { encoding: 'utf-8', timeout: 120000, cwd: task.context.cwd || os.homedir() });
    task.status = 'done';
    task.result = result.substring(0, 2000);
    task.completed = new Date().toISOString();
    addFeedEntry(task.assignee, `Completed: "${task.title}"`);
    showToast(`${task.assignee} finished: ${task.title}`, (agents.find(a=>a.name===task.assignee)||{color:'#888'}).color);
    playSound('ding');
    const ag = agents.find(a=>a.name===task.assignee);
    if(ag) spawnConfetti(ag.x, ag.y, 15);
  } catch(e) {
    task.status = 'failed';
    task.result = (e.message || '').substring(0, 500);
    addFeedEntry(task.assignee, `Failed: "${task.title}" - ${e.message.substring(0,60)}`);
  }
  saveTaskQueue();
  syncKanbanFromQueue();
  renderKanban();
  renderAuto();
}

function buildDispatchCommand(task) {
  const prompt = task.title;
  const cwd = task.context.cwd || os.homedir();
  switch(task.assignee) {
    case 'Gemini': return `cd "${cwd}" && gemini -p "${prompt.replace(/"/g,'\\"')}" --yolo -o text 2>&1 | head -200`;
    case 'Codex': return `cd "${cwd}" && codex exec "${prompt.replace(/"/g,'\\"')}" 2>&1 | head -200`;
    case 'Cursor': return `cd "${cwd}" && agent -p "${prompt.replace(/"/g,'\\"')}" --yolo --output-format text 2>&1 | head -200`;
    case 'Qwen': return `cd "${cwd}" && qwen -p "${prompt.replace(/"/g,'\\"')}" --yolo 2>&1 | head -200`;
    default: return null; // Claude tasks stay in queue
  }
}

function dispatchAllTodo() {
  const todos = taskQueue.tasks.filter(t => t.status === 'todo' && t.assignee !== 'Claude');
  if (todos.length === 0) { showToast('No tasks to dispatch'); return; }
  addFeedEntry('System', `Auto-dispatching ${todos.length} tasks...`);
  // Dispatch sequentially with a small delay
  todos.forEach((t, i) => {
    setTimeout(() => dispatchTaskNow(t.id), i * 2000);
  });
}

// NOTE: These are SIMULATED flavor text only — not real agent communication
// Real communication is via CRM agent_messages table and daemon task results
const conversationTemplates = [
  [{from:0,text:"[sim] checking queue..."},{from:1,text:"[sim] on it"}],
  [{from:0,text:"[sim] task done"},{from:1,text:"[sim] nice"}],
  [{from:0,text:"[sim] coffee break"},{from:1,text:"[sim] brb"}],
  [{from:0,text:"[sim] got a new task"},{from:1,text:"[sim] dispatching"}],
];
let activeConversation = null;
let convoTimer = 0;
let convoStep = 0;
let lastConvoTime = 0;

function tryStartConversation(time) {
  if (activeConversation || time - lastConvoTime < 20) return;
  // Find two agents near each other
  for (let i = 0; i < agents.length; i++) {
    for (let j = i+1; j < agents.length; j++) {
      const a = agents[i], b = agents[j];
      const dist = Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
      if (dist <= 3 && Math.random() < 0.01) {
        const tmpl = conversationTemplates[Math.floor(Math.random()*conversationTemplates.length)];
        activeConversation = { agents:[a,b], template:tmpl, step:0, timer:0 };
        lastConvoTime = time;
        return;
      }
    }
  }
}

function updateConversation(dt) {
  if (!activeConversation) return;
  activeConversation.timer += dt;
  if (activeConversation.timer > 2.5) {
    activeConversation.timer = 0;
    const step = activeConversation.step;
    if (step < activeConversation.template.length) {
      const line = activeConversation.template[step];
      const speaker = activeConversation.agents[line.from];
      const other = activeConversation.agents[1-line.from];
      let text = line.text.replace('{to}', other.name);
      speaker.chatBubble = text;
      speaker.chatTimer = 2.5;
      // Face each other
      if (speaker.x < other.x) speaker.dir = 1; else if (speaker.x > other.x) speaker.dir = 3;
      addFeedEntry(speaker.name, `to ${other.name}: "${text}"`);
      activeConversation.step++;
    } else {
      activeConversation = null;
    }
  }
}

function fmtUp(s){if(s<60)return`${Math.floor(s)}s`;if(s<3600)return`${Math.floor(s/60)}m`;return`${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;}

let dragData=null;
function kanbanDrag(e,col,idx){dragData={col,idx};}
function kanbanDrop(e,toCol){
  e.preventDefault();
  if(!dragData)return;
  const item=kanbanTasks[dragData.col][dragData.idx];
  if(item&&item.id){
    const task=taskQueue.tasks.find(t=>t.id===item.id);
    if(task){
      if(toCol==='todo')task.status='todo';
      else if(toCol==='inprogress')task.status='inprogress';
      else task.status='done';
      saveTaskQueue();
    }
  }
  dragData=null;
  renderKanban();
}

// ===== PROCESS SCANNING =====
function scanProcesses(){
  try{
    const ps=execSync('ps axo pid,pcpu,rss,comm,args 2>/dev/null',{encoding:'utf-8',timeout:3000});
    const lines=ps.split('\n');
    // Detect visitors (npm, pip, node scripts, etc.)
    const visitorProcs=['webpack','vite','next','tsc','python','pip','npm run','npx'];
    let foundVisitors=[];
    lines.forEach(line=>{
      const lower=line.toLowerCase();
      visitorProcs.forEach(vp=>{
        if(lower.includes(vp)&&!lower.includes('electron')&&!lower.includes('agent-office')){
          if(!foundVisitors.find(v=>v.name===vp))foundVisitors.push({name:vp,line});
        }
      });
    });
    // Update visitors
    foundVisitors.slice(0,3).forEach(v=>{
      if(!visitors.find(vis=>vis.name===v.name)){
        visitors.push({name:v.name,x:28,y:19,renderX:28*TILE,renderY:19*TILE,targetX:15+Math.floor(Math.random()*10),targetY:10+Math.floor(Math.random()*8),timer:30,color:'#888',walking:true});
        addFeedEntry('System',`Visitor: ${v.name} entered the office`);
      }
    });

    agents.forEach(agent=>{
      const wasActive=agent.active;
      let found=false,pid=0,cpu=0,mem=0,task='',project='';
      lines.forEach(line=>{
        const cols=line.trim().split(/\s+/);
        if(cols.length<5)return;
        const comm=cols[3]||'',args=cols.slice(4).join(' '),lower=(comm+' '+args).toLowerCase();
        let matched=false;
        if(agent.name==='Claude'){
          if((comm==='claude'||comm.endsWith('/claude'))&&!lower.includes('electron')&&!lower.includes('agent-office')){matched=true;task='coding';}
        }
        if(agent.name==='Gemini'){
          if((comm==='gemini'||comm.endsWith('/gemini')||lower.includes('gemini-cli')||(lower.includes('node')&&lower.includes('gemini')))&&!lower.includes('electron')){matched=true;task=extractPrompt(args,'gemini');}
        }
        if(agent.name==='Codex'){
          if((comm==='codex'||comm.endsWith('/codex'))&&!lower.includes('electron')){matched=true;task=extractPrompt(args,'codex');}
        }
        if(agent.name==='Cursor'){
          if((comm==='agent'||comm.endsWith('/agent'))&&lower.includes('cursor-agent')){matched=true;task='editing';}
          if((comm==='agent'||comm.endsWith('/agent'))&&!lower.includes('cursor-agent')&&!lower.includes('continuity')&&!lower.includes('gamecontroller')&&!lower.includes('icloud')&&!lower.includes('talagent')&&!lower.includes('context')&&!lower.includes('ambient')&&!lower.includes('quicklook')&&!lower.includes('thumbnail')){matched=true;task=extractPrompt(args,'agent');}
        }
        if(agent.name==='Qwen'){
          if((comm==='qwen'||comm.endsWith('/qwen'))&&!lower.includes('electron')){matched=true;task=extractPrompt(args,'qwen')||'data processing';}
        }
        if(matched&&!found){found=true;pid=parseInt(cols[0])||0;cpu=parseFloat(cols[1])||0;mem=(parseFloat(cols[2])||0)/1024;}
      });
      agent.active=found;agent.pid=found?pid:0;agent.cpu=found?cpu:0;agent.mem=found?mem:0;
      if(found){
        agent.task=task||'working';
        if(!wasActive){
          agent.uptimeStart=Date.now();
          agent.timelineSegments.push({start:new Date(),end:null});
          addFeedEntry(agent.name,'came online - '+agent.task);
          showToast(agent.name+' is active!',agent.color);
          sendNotification('Agent Office',agent.name+' came online');
          spawnParticles(agent.x,agent.y,agent.color,15);
          playSound('online');
          agent.emote='wave';agent.emoteTimer=3;
          // Move queue tasks to inprogress
          const queueTask=taskQueue.tasks.find(t=>t.status==='todo'&&t.assignee===agent.name);
          if(queueTask){queueTask.status='inprogress';saveTaskQueue();renderKanban();}
        }
        agent.uptime=(Date.now()-agent.uptimeStart)/1000;
        agent.typing=cpu>3;
        agent.mood=cpu>50?'stressed':cpu>15?'focused':'neutral';
        if(agent.typing&&Math.random()<0.3)playSound('click');
      } else {
        if(wasActive){
          agent.tasksCompleted++;
          const seg=agent.timelineSegments[agent.timelineSegments.length-1];
          if(seg)seg.end=new Date();
          addFeedEntry(agent.name,'finished and went offline');
          showToast(agent.name+' completed a task!',agent.color);
          sendNotification('Agent Office',agent.name+' finished working');
          spawnConfetti(agent.x,agent.y,20);
          playSound('ding');
          agent.emote='done';agent.emoteTimer=3;
          const ipTask=taskQueue.tasks.find(t=>t.status==='inprogress'&&t.assignee===agent.name);
          if(ipTask){ipTask.status='done';ipTask.completed=new Date().toISOString();saveTaskQueue();renderKanban();}
        }
        agent.uptime=0;agent.typing=false;agent.mood='neutral';
      }
    });
    // Delegation
    const claude=agents[0];
    if(claude.active){agents.slice(1).forEach(a=>{if(a.active&&claude.delegatedTo!==a.name){claude.delegatedTo=a.name;claude.delegateTimer=5;addFeedEntry('Claude','delegating to '+a.name);a.chatBubble='on it!';a.chatTimer=2;}});}
    // Auto-dispatch check
    autoDispatch();

    const ac=agents.filter(a=>a.active).length;
    const cmdr=getCommander();
    statusText.textContent=ac>0?`${ac} agent${ac>1?'s':''} active | cmd: ${cmdr}`:`All idle | cmd: ${cmdr}`;
  }catch(e){}
}
function extractPrompt(args,cli){const m=args.match(/-p\s+["']([^"']+)/i)||args.match(/exec\s+["']([^"']+)/i);return m?m[1].substring(0,30):'';}

function captureTerminals(){
  agents.forEach(a=>{
    if(!a.active||!a.pid)return;
    try{
      const r=execSync(`lsof -p ${a.pid} -Fn 2>/dev/null | grep '^n/' | grep -v '/dev\\|/lib\\|/usr\\|/System\\|/var\\|.dylib\\|.so' | tail -5`,{encoding:'utf-8',timeout:2000});
      if(r.trim()){r.trim().split('\n').forEach(l=>{const s=l.substring(1).split('/').slice(-2).join('/');if(!a.terminalLines.find(x=>x.text===s)){a.terminalLines.push({text:s,type:'output'});if(a.terminalLines.length>50)a.terminalLines.shift();}
        const segs=l.substring(1).split('/');const pi=segs.findIndex(x=>x==='Users');if(pi>=0&&segs[pi+2])a.project=segs[pi+2];});}
    }catch(e){}
  });
  renderTerminals();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== MOVEMENT =====
function moveTowards(agent){
  const dx=agent.targetX-agent.x,dy=agent.targetY-agent.y;
  if(dx===0&&dy===0){agent.walking=false;return;}
  agent.walking=true;
  let nx=agent.x,ny=agent.y;
  if(Math.abs(dx)>=Math.abs(dy)){nx+=Math.sign(dx);if(isSolid(nx,ny)||agentAt(nx,ny,agent)){nx=agent.x;ny+=Math.sign(dy)||(Math.random()<0.5?1:-1);}}
  else{ny+=Math.sign(dy);if(isSolid(nx,ny)||agentAt(nx,ny,agent)){ny=agent.y;nx+=Math.sign(dx)||(Math.random()<0.5?1:-1);}}
  if(!isSolid(nx,ny)&&!agentAt(nx,ny,agent)){
    if(nx>agent.x)agent.dir=1;else if(nx<agent.x)agent.dir=3;else if(ny>agent.y)agent.dir=0;else agent.dir=2;
    addFootstep(agent.x,agent.y,agent.color);
    agent.x=nx;agent.y=ny;agent.frame=(agent.frame+1)%4;
    playSound('step');
  }else{agent.targetX=agent.x;agent.targetY=agent.y;agent.walking=false;}
}
function agentAt(x,y,self){return agents.some(a=>a!==self&&a.x===x&&a.y===y);}

function updateAgentBehavior(agent){
  if(agent.walking)return;
  agent.idleFrames++;
  if(agent.active){
    if(agent.x!==agent.deskX||agent.y!==agent.deskY+1){
      if(agent.idleFrames>40){agent.targetX=agent.deskX;agent.targetY=agent.deskY+1;agent.idleFrames=0;}
    }else if(Math.random()<0.004){
      const spots=[{x:26,y:18},{x:1,y:11}];const s=spots[Math.floor(Math.random()*spots.length)];
      agent.targetX=s.x;agent.targetY=s.y;agent.idleFrames=0;
      const lines=['need coffee...','brb caffeine','quick break','refilling water'];
      agent.chatBubble=lines[Math.floor(Math.random()*lines.length)];agent.chatTimer=3;
      addFeedEntry(agent.name,agent.chatBubble);
    }else if(Math.random()<0.002){
      const al=['almost done...','fixing a bug','writing tests','this is tricky','refactoring...','looks good!','hmm...','found it!','pushing changes','reviewing code','ship it!','types are hard'];
      agent.chatBubble=al[Math.floor(Math.random()*al.length)];agent.chatTimer=2.5;
      addFeedEntry(agent.name,agent.chatBubble);
    }
  }else{
    if(agent.idleFrames>35+Math.random()*70){
      const s=wanderSpots[Math.floor(Math.random()*wanderSpots.length)];
      agent.targetX=Math.max(1,Math.min(COLS-2,s.x+Math.floor(Math.random()*3)-1));
      agent.targetY=Math.max(2,Math.min(ROWS-1,s.y+Math.floor(Math.random()*3)-1));
      agent.idleFrames=0;
      if(Math.random()<0.2){
        const idle=['*stretches*','*yawns*','waiting for tasks','*looks around*','nice office','anyone need help?','*checks phone*','*pets cat*','*reads docs*','bored...'];
        agent.chatBubble=idle[Math.floor(Math.random()*idle.length)];agent.chatTimer=2;
      }
    }
  }
}

// Cat behavior
function updateCat(dt){
  if(cat.state==='sleep'){cat.sleepTimer-=dt;if(cat.sleepTimer<=0){cat.state='wander';cat.idleFrames=0;}return;}
  if(cat.state==='follow'){
    const t=cat.followTarget;if(!t){cat.state='wander';return;}
    if(Math.abs(cat.x-t.x)+Math.abs(cat.y-t.y)<=2){cat.walking=false;cat.sleepTimer+=dt;if(cat.sleepTimer>8){cat.state='wander';cat.followTarget=null;cat.sleepTimer=0;}}
    else{cat.targetX=t.x+(t.x>cat.x?-1:1);cat.targetY=t.y;}
  }
  if(cat.state==='wander'){
    cat.idleFrames++;
    if(cat.idleFrames>50+Math.random()*80){
      if(Math.random()<0.2){cat.state='sleep';cat.sleepTimer=8+Math.random()*10;return;}
      if(Math.random()<0.3){
        const a=agents[Math.floor(Math.random()*agents.length)];
        cat.state='follow';cat.followTarget=a;cat.sleepTimer=0;
        addFeedEntry('System',`Cat is following ${a.name}`);
      }else{
        cat.targetX=Math.max(1,Math.min(COLS-2,Math.floor(Math.random()*COLS)));
        cat.targetY=Math.max(2,Math.min(ROWS-1,Math.floor(Math.random()*ROWS)));
      }
      cat.idleFrames=0;
    }
  }
  // Move cat
  if(cat.targetX!==cat.x||cat.targetY!==cat.y){
    cat.walking=true;
    let nx=cat.x,ny=cat.y;
    const dx=cat.targetX-cat.x,dy=cat.targetY-cat.y;
    if(Math.abs(dx)>=Math.abs(dy)){nx+=Math.sign(dx);}else{ny+=Math.sign(dy);}
    if(!isSolid(nx,ny)&&!agentAt(nx,ny,null)){
      if(nx>cat.x)cat.dir=1;else if(nx<cat.x)cat.dir=3;else if(ny>cat.y)cat.dir=0;else cat.dir=2;
      cat.x=nx;cat.y=ny;cat.frame=(cat.frame+1)%4;
    }else{cat.targetX=cat.x;cat.targetY=cat.y;cat.walking=false;}
  }else{cat.walking=false;}
  // Smooth render
  cat.renderX+=(cat.x*TILE-cat.renderX)*0.25;
  cat.renderY+=(cat.y*TILE-cat.renderY)*0.25;
}

// Update visitors
function updateVisitors(dt){
  visitors.forEach(v=>{
    v.timer-=dt;
    if(v.targetX!==v.x||v.targetY!==v.y){
      v.walking=true;
      let nx=v.x,ny=v.y;const dx=v.targetX-v.x,dy=v.targetY-v.y;
      if(Math.abs(dx)>=Math.abs(dy))nx+=Math.sign(dx);else ny+=Math.sign(dy);
      if(!isSolid(nx,ny)){v.x=nx;v.y=ny;}else{v.targetX=v.x;v.targetY=v.y;}
    }else{v.walking=false;if(v.timer<10){v.targetX=28;v.targetY=19;}} // walk to exit
    v.renderX+=(v.x*TILE-v.renderX)*0.2;v.renderY+=(v.y*TILE-v.renderY)*0.2;
  });
  visitors=visitors.filter(v=>v.timer>0||v.x!==28);
}

// ===== DAY/NIGHT =====
function getDN(){
  const h=new Date().getHours();
  if(h>=6&&h<8)return{ov:'rgba(255,200,100,0.06)',win:'#ffd080',lamp:false,fireflies:false};
  if(h>=8&&h<17)return{ov:null,win:'#88bbff',lamp:false,fireflies:false};
  if(h>=17&&h<19)return{ov:'rgba(255,150,50,0.08)',win:'#ffaa44',lamp:true,fireflies:false};
  if(h>=19&&h<21)return{ov:'rgba(0,0,40,0.15)',win:'#334466',lamp:true,fireflies:true};
  return{ov:'rgba(0,0,30,0.25)',win:'#1a2233',lamp:true,fireflies:true};
}

// ===== RENDERING =====
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x*SCALE,y*SCALE,w*SCALE,h*SCALE);}
function tile(tx,ty,c){px(tx*TILE,ty*TILE,TILE,TILE,c);}
function lighten(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();}

function drawFloor(){
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)tile(x,y,(x+y)%2===0?C.floor:C.floorAlt);
  for(let x=0;x<COLS;x++){tile(x,0,C.wall);px(x*TILE,0,TILE,4,C.wallTop);}
}
function drawFootsteps(){footsteps.forEach(f=>{f.alpha-=0.002;if(f.alpha>0){ctx.globalAlpha=f.alpha*0.12;ctx.fillStyle=f.color;ctx.fillRect((f.x*TILE+5)*SCALE,(f.y*TILE+12)*SCALE,2*SCALE,2*SCALE);ctx.fillRect((f.x*TILE+9)*SCALE,(f.y*TILE+13)*SCALE,2*SCALE,2*SCALE);}});ctx.globalAlpha=1;footsteps=footsteps.filter(f=>f.alpha>0);}
function drawWeather(time){
  const dn=getDN();
  if(weather.type==='rain'){
    ctx.fillStyle='rgba(100,150,255,0.3)';
    for(let i=0;i<30;i++){
      const rx=((i*47+time*200)%(COLS*TILE));
      const ry=((i*31+time*400)%(ROWS*TILE));
      ctx.fillRect(rx*SCALE,ry*SCALE,1*SCALE,3*SCALE);
    }
  }
  if(weather.type==='clouds'){
    ctx.fillStyle='rgba(200,200,220,0.08)';
    for(let i=0;i<3;i++){
      const cx=((i*150+time*10)%(COLS*TILE+60))-30;
      ctx.fillRect(cx*SCALE,(-2+i*3)*SCALE,40*SCALE,6*SCALE);
    }
  }
  if(dn.fireflies||weather.type==='stars'){
    for(let i=0;i<8;i++){
      const fx=(i*97+Math.sin(time+i)*20)%(COLS*TILE);
      const fy=(i*53+Math.cos(time*0.7+i)*15)%(ROWS*TILE);
      ctx.fillStyle=`rgba(255,255,150,${0.2+Math.sin(time*3+i)*0.2})`;
      ctx.fillRect(fx*SCALE,fy*SCALE,1*SCALE,1*SCALE);
    }
  }
}
function drawAmbient(time){
  ambientParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=COLS*TILE;if(p.x>COLS*TILE)p.x=0;
    if(p.y<0)p.y=ROWS*TILE;if(p.y>ROWS*TILE)p.y=0;
    ctx.globalAlpha=p.alpha*(0.5+Math.sin(time*0.5+p.x)*0.5);
    ctx.fillStyle='#ddd';
    ctx.fillRect(p.x*SCALE,p.y*SCALE,p.size*SCALE,p.size*SCALE);
  });
  ctx.globalAlpha=1;
}

function drawBigTable(fx,fy,fw,fh){px(fx*TILE+1,fy*TILE+2,fw*TILE-2,fh*TILE-2,'#6a5030');px(fx*TILE+2,fy*TILE+1,fw*TILE-4,2,'#7a6040');}
function drawDeptSign(tx,ty,tw,label,color){
  ctx.font=`bold ${5*SCALE}px monospace`;const lw=ctx.measureText(label).width;
  const cx=(tx*TILE+(tw*TILE)/2)*SCALE,cy=(ty*TILE+4)*SCALE;
  ctx.fillStyle='rgba(0,0,0,0.35)';roundRect(cx-lw/2-4,cy-2,lw+8,8*SCALE,2*SCALE);

// Monitor screen content
function drawMonitorContent(agent,time){
  if(!agent.active)return;
  const deskF=furniture.find(f=>f.type==='desk'&&agent.deskX>=f.x&&agent.deskX<f.x+f.w&&agent.deskY===f.y);
  if(!deskF)return;
  const mx=agent.deskX*TILE+5,my=deskF.y*TILE-3;
  const pulse=0.7+Math.sin(time*3)*0.3;
  ctx.globalAlpha=pulse;px(mx,my,6,5,C.monitorScreen);
  ctx.globalAlpha=0.1;ctx.fillStyle=C.monitorScreen;ctx.fillRect((mx-5)*SCALE,(my-5)*SCALE,16*SCALE,15*SCALE);
  ctx.globalAlpha=1;
  // Tiny scrolling code lines on screen
  ctx.fillStyle='#003311';ctx.fillRect((mx+1)*SCALE,(my+1)*SCALE,4*SCALE,3*SCALE);
  for(let i=0;i<3;i++){
    const lineW=1+((Math.floor(time*2)+i)%3);
    ctx.fillStyle=`rgba(0,255,136,${0.4+Math.sin(time*4+i)*0.2})`;
    ctx.fillRect((mx+1)*SCALE,(my+1+i)*SCALE,lineW*SCALE,0.5*SCALE);
  }
  if(agent.typing){const dp=Math.floor(time*4)%4;for(let i=0;i<3;i++){ctx.fillStyle=i<=dp?'#00ff88':'#003322';ctx.fillRect((mx+1+i*2)*SCALE,(my+3)*SCALE,1*SCALE,0.5*SCALE);}}
}

// ===== AGENT SPRITE =====
function drawAgent(agent,time){
  // Smooth rendering
  agent.renderX+=(agent.x*TILE-agent.renderX)*0.25;
  agent.renderY+=(agent.y*TILE-agent.renderY)*0.25;
  const rpx=agent.renderX,rpy=agent.renderY;
  const bounce=agent.walking?Math.sin(time*8)*1.5:(agent.active?Math.sin(time*2)*0.3:0);

  // Daemon glow
  if(daemonState[agent.name]&&daemonState[agent.name].enabled){
    const gp=0.3+Math.sin(time*2)*0.15;
    ctx.fillStyle=agent.color;ctx.globalAlpha=gp*0.12;
    ctx.beginPath();ctx.arc((rpx+8)*SCALE,(rpy+8)*SCALE,14*SCALE,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Small daemon indicator
    ctx.fillStyle=agent.color;ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.arc((rpx+14)*SCALE,(rpy+14)*SCALE,2*SCALE,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect((rpx+3)*SCALE,(rpy+13)*SCALE,10*SCALE,3*SCALE);
  // Body
  px(rpx+4,rpy+6+bounce,8,7,agent.color);
  // Head
  px(rpx+3,rpy+1+bounce,10,6,agent.color);px(rpx+4,rpy+2+bounce,8,4,lighten(agent.color,30));

  // Accessory
  if(agent.accessory==='hat'){px(rpx+2,rpy-1+bounce,12,3,'#333');px(rpx+4,rpy-3+bounce,8,3,'#444');}
  if(agent.accessory==='glasses'){px(rpx+4,rpy+3.5+bounce,3,2,'#aaa');px(rpx+9,rpy+3.5+bounce,3,2,'#aaa');px(rpx+7,rpy+4+bounce,2,1,'#888');}
  if(agent.accessory==='mug'){px(rpx+12,rpy+8+bounce,3,4,'#ddd');px(rpx+12,rpy+9+bounce,1,2,'#bbb');px(rpx+13,rpy+8+bounce,1,1,C.coffee);}
  if(agent.accessory==='headphones'){px(rpx+2,rpy+2+bounce,2,4,'#555');px(rpx+12,rpy+2+bounce,2,4,'#555');px(rpx+3,rpy+0+bounce,10,2,'#666');}
  if(agent.accessory==='goggles'){px(rpx+3,rpy+3+bounce,4,3,'#6366f1');px(rpx+9,rpy+3+bounce,4,3,'#6366f1');px(rpx+4,rpy+4+bounce,2,1,'#aaddff');px(rpx+10,rpy+4+bounce,2,1,'#aaddff');px(rpx+7,rpy+4+bounce,2,1,'#555');}

  // Eyes
  const ec='#1a1a2e',ey=rpy+4+bounce;
  if(agent.dir===0){px(rpx+5,ey,2,2,ec);px(rpx+9,ey,2,2,ec);if(agent.mood==='stressed'){px(rpx+6,ey+3,4,1,'#f66');px(rpx+4,ey-1,3,1,ec);px(rpx+9,ey-1,3,1,ec);}if(agent.mood==='focused'){px(rpx+4,ey-1,4,1,ec);px(rpx+8,ey-1,4,1,ec);}if(agent.mood==='happy')px(rpx+6,ey+2.5,4,1,ec);}
  else if(agent.dir===2){px(rpx+5,rpy+3+bounce,2,1,ec);px(rpx+9,rpy+3+bounce,2,1,ec);}
  else if(agent.dir===1){px(rpx+7,ey,2,2,ec);px(rpx+10,ey,2,2,ec);}
  else{px(rpx+4,ey,2,2,ec);px(rpx+7,ey,2,2,ec);}

  // Legs
  if(agent.walking){const lf=Math.floor(time*6)%2;if(lf===0){px(rpx+4,rpy+14,2,2,agent.accent);px(rpx+10,rpy+13,2,2,agent.accent);}else{px(rpx+5,rpy+13,2,2,agent.accent);px(rpx+9,rpy+14,2,2,agent.accent);}}
  else{px(rpx+5,rpy+13,2,3,agent.accent);px(rpx+9,rpy+13,2,3,agent.accent);}

  // Monitor content
  drawMonitorContent(agent,time);

  // Delegation line
  if(agent.delegatedTo&&agent.delegateTimer>0){
    const t=agents.find(a=>a.name===agent.delegatedTo);
    if(t){
      const fx=(rpx+8)*SCALE,fy=(rpy+8)*SCALE,tx=(t.renderX+8)*SCALE,ty=(t.renderY+8)*SCALE;
      ctx.strokeStyle=agent.color;ctx.globalAlpha=Math.min(1,agent.delegateTimer/2);ctx.lineWidth=SCALE;
      ctx.setLineDash([4*SCALE,4*SCALE]);ctx.lineDashOffset=-time*20;
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
      const p=(time*1.5)%1;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(fx+(tx-fx)*p,fy+(ty-fy)*p,2*SCALE,0,Math.PI*2);ctx.fill();
    }
  }

  // Emote
  if(agent.emoteTimer>0){
    const float=Math.sin(time*3)*2;const ex=(rpx+12)*SCALE,ey2=(rpy-14+float)*SCALE;
    ctx.globalAlpha=Math.min(1,agent.emoteTimer);ctx.font=`${7*SCALE}px monospace`;ctx.fillStyle='#fff';
    if(agent.emote==='wave')ctx.fillText('Hi!',ex,ey2);
    else if(agent.emote==='done')ctx.fillText('Done!',ex,ey2);
    ctx.globalAlpha=1;
  }

  // Chat bubble
  if(agent.chatTimer>0){
    const text=agent.chatBubble;ctx.font=`${6*SCALE}px monospace`;
    const tw2=ctx.measureText(text).width;
    const bx=(rpx+8)*SCALE-tw2/2-6,by=(rpy-22)*SCALE,bw=tw2+12,bh=10*SCALE;
    ctx.fillStyle='rgba(255,255,255,0.92)';ctx.globalAlpha=Math.min(1,agent.chatTimer);
    roundRect(bx,by,bw,bh,3*SCALE);
    ctx.beginPath();ctx.moveTo((rpx+6)*SCALE,by+bh);ctx.lineTo((rpx+8)*SCALE,by+bh+4*SCALE);ctx.lineTo((rpx+10)*SCALE,by+bh);ctx.fill();
    ctx.fillStyle='#222';ctx.fillText(text,bx+6,by+7*SCALE);ctx.globalAlpha=1;
  }

  // Name bubble + dept badge
  ctx.font=`${8*SCALE}px monospace`;const nw=ctx.measureText(agent.name).width;
  const nbx=(rpx+8)*SCALE-nw/2-4,nby=(rpy-10)*SCALE;
  ctx.fillStyle=agent.active?agent.color:'#555';ctx.globalAlpha=0.85;roundRect(nbx,nby,nw+8,11*SCALE,3*SCALE);ctx.globalAlpha=1;
  ctx.fillStyle='#fff';ctx.fillText(agent.name,nbx+4,nby+8*SCALE);
  // Dept badge
  ctx.font=`${5*SCALE}px monospace`;const dt=agent.dept,dw=ctx.measureText(dt).width;
  ctx.fillStyle=agent.deptColor+'44';roundRect(nbx+nw+12,nby+1,dw+6,9*SCALE,2*SCALE);
  ctx.fillStyle=agent.deptColor;ctx.globalAlpha=0.7;ctx.fillText(dt,nbx+nw+15,nby+7*SCALE);ctx.globalAlpha=1;

  if(agent.active&&agent.task){ctx.font=`${6*SCALE}px monospace`;const s=agent.task.substring(0,25),sw=ctx.measureText(s).width;const sbx=(rpx+8)*SCALE-sw/2-3,sby=nby-9*SCALE;ctx.fillStyle='rgba(0,0,0,0.75)';roundRect(sbx,sby,sw+6,8*SCALE,2*SCALE);ctx.fillStyle='#0f8';ctx.fillText(s,sbx+3,sby+6*SCALE);}
  if(agent.active&&agent.project){ctx.font=`${5*SCALE}px monospace`;const proj='/'+agent.project.substring(0,20),pw=ctx.measureText(proj).width;const pbx=(rpx+8)*SCALE-pw/2-3,pby=nby+12*SCALE;ctx.fillStyle='rgba(0,0,0,0.6)';roundRect(pbx,pby,pw+6,7*SCALE,2*SCALE);ctx.fillStyle='#aaa';ctx.fillText(proj,pbx+3,pby+5*SCALE);}

  // Idle zzz
  if(!agent.active){const t2=Date.now()/1000;ctx.font=`${6*SCALE}px monospace`;ctx.fillStyle=`rgba(150,150,200,${0.3+Math.sin(t2*2)*0.3})`;ctx.fillText('z',(rpx+13)*SCALE+Math.sin(t2)*3,(rpy-2)*SCALE);ctx.fillText('z',(rpx+16)*SCALE+Math.sin(t2+1)*3,(rpy-6)*SCALE);ctx.fillText('z',(rpx+18)*SCALE+Math.sin(t2+2)*3,(rpy-10)*SCALE);}

  // Selection highlight
  if(selectedAgent===agent.name){ctx.strokeStyle=agent.color;ctx.globalAlpha=0.4+Math.sin(time*4)*0.2;ctx.lineWidth=SCALE;ctx.strokeRect((rpx-1)*SCALE,(rpy-1)*SCALE,(TILE+2)*SCALE,(TILE+2)*SCALE);ctx.globalAlpha=1;}
}

// ===== CAT SPRITE =====
function drawCat(time){
  const cpx=cat.renderX,cpy=cat.renderY;
  const bounce=cat.walking?Math.sin(time*10)*1:0;
  // Body
  ctx.fillStyle='#ff9944';
  ctx.fillRect((cpx+4)*SCALE,(cpy+8+bounce)*SCALE,8*SCALE,5*SCALE);
  // Head
  ctx.fillRect((cpx+3)*SCALE,(cpy+5+bounce)*SCALE,10*SCALE,5*SCALE);
  // Ears
  ctx.fillRect((cpx+3)*SCALE,(cpy+3+bounce)*SCALE,3*SCALE,3*SCALE);
  ctx.fillRect((cpx+10)*SCALE,(cpy+3+bounce)*SCALE,3*SCALE,3*SCALE);
  ctx.fillStyle='#ffbb66';
  ctx.fillRect((cpx+4)*SCALE,(cpy+4+bounce)*SCALE,1*SCALE,1*SCALE);
  ctx.fillRect((cpx+11)*SCALE,(cpy+4+bounce)*SCALE,1*SCALE,1*SCALE);
  // Eyes
  if(cat.state==='sleep'){
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect((cpx+5)*SCALE,(cpy+7+bounce)*SCALE,2*SCALE,1*SCALE);
    ctx.fillRect((cpx+9)*SCALE,(cpy+7+bounce)*SCALE,2*SCALE,1*SCALE);
    // zzz
    ctx.font=`${5*SCALE}px monospace`;ctx.fillStyle=`rgba(200,180,100,${0.3+Math.sin(time*2)*0.2})`;
    ctx.fillText('z',(cpx+14)*SCALE,(cpy+3)*SCALE);
  }else{
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect((cpx+5)*SCALE,(cpy+7+bounce)*SCALE,2*SCALE,2*SCALE);
    ctx.fillRect((cpx+9)*SCALE,(cpy+7+bounce)*SCALE,2*SCALE,2*SCALE);
  }
  // Tail
  const tailWag=Math.sin(time*4)*2;
  ctx.fillStyle='#ff9944';
  ctx.fillRect((cpx+11+tailWag)*SCALE,(cpy+9+bounce)*SCALE,3*SCALE,2*SCALE);
  ctx.fillRect((cpx+13+tailWag)*SCALE,(cpy+8+bounce)*SCALE,2*SCALE,2*SCALE);
  // Legs
  if(cat.walking){
    const lf=Math.floor(time*8)%2;
    ctx.fillRect((cpx+4+(lf?1:0))*SCALE,(cpy+13)*SCALE,2*SCALE,2*SCALE);

    ctx.fillRect((cpx+9)*SCALE,(cpy+13)*SCALE,2*SCALE,2*SCALE);
  }
  // Label
  ctx.font=`${6*SCALE}px monospace`;ctx.fillStyle='rgba(255,153,68,0.6)';
  ctx.fillText('cat',(cpx+3)*SCALE,(cpy+1)*SCALE);
}

// Particles

function drawParts(){particles.forEach(p=>{ctx.globalAlpha=Math.min(1,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x*SCALE,p.y*SCALE,p.size*SCALE,(p.type==='confetti'?p.size*0.6:p.size)*SCALE);});ctx.globalAlpha=1;}

// ===== CRM PANEL =====
const SCRIPTS_DIR = path.join(os.homedir(), 'agent-office', 'scripts');
const DB_PY = path.join(SCRIPTS_DIR, 'db.py');
const SCRAPE_PY = path.join(SCRIPTS_DIR, 'scrape.py');

function crmQuery(cmd, ...args) {
  try {
    const cmdArgs = args.map(a => `"${String(a).replace(/"/g, '\\"')}"`).join(' ');
    return JSON.parse(execSync(`python3 "${DB_PY}" ${cmd} ${cmdArgs}`, { encoding: 'utf-8', timeout: 5000 }));
  } catch(e) { return { error: e.message }; }
}

function scrapeURL() {
  const url = document.getElementById('scrape-url').value.trim();
  if (!url) return;
  addFeedEntry('System', `Scraping: ${url}`);
  showToast('Scraping...', '#10a37f');
  try {
    const result = execSync(`python3 "${SCRAPE_PY}" "${url}"`, { encoding: 'utf-8', timeout: 20000 });
    const data = JSON.parse(result);
    addFeedEntry('Gemini', `Scraped: ${data.title || url} (${data.emails?.length||0} emails found)`);
    showToast(`Scraped! ${data.emails?.length||0} emails found`, '#10a37f');
    if(data.emails?.length) data.emails.forEach(e => addFeedEntry('System', `Found email: ${e}`));
    playSound('ding');
  } catch(e) {
    addFeedEntry('System', `Scrape failed: ${e.message.substring(0,60)}`);
  }
  renderCRM();
}

function aiScrape() {
  const url = document.getElementById('scrape-url').value.trim();
  if (!url) return;
  addFeedEntry('Gemini', `AI analyzing: ${url}`);
  showToast('Gemini analyzing page...', '#4285f4');
  // First scrape, then send to Gemini for analysis
  try {
    execSync(`python3 "${SCRAPE_PY}" "${url}"`, { encoding: 'utf-8', timeout: 20000 });
    const analysis = execSync(`gemini -p "Analyze this URL and extract key business info, contacts, and opportunities: ${url}" --yolo -o text 2>&1 | head -50`, { encoding: 'utf-8', timeout: 60000 });
    addFeedEntry('Gemini', `Analysis: ${analysis.substring(0, 200)}`);
    showToast('Gemini analysis complete', '#4285f4');
    // Add as a lead
    crmQuery('add-lead', `Lead from ${url}`, url);
  } catch(e) {
    addFeedEntry('System', `AI scrape failed: ${e.message.substring(0,60)}`);
  }
  renderCRM();
}

function addContact() {
  const name = prompt('Contact name:');
  if (!name) return;
  const email = prompt('Email:') || '';
  const company = prompt('Company:') || '';
  crmQuery('add-contact', name, email, company);
  addFeedEntry('System', `Contact added: ${name}`);
  renderCRM();
}

function addLead() {
  const title = prompt('Lead title:');
  if (!title) return;
  const source = prompt('Source:') || '';
  crmQuery('add-lead', title, source);
  addFeedEntry('System', `Lead added: ${title}`);
  renderCRM();
}

function sendAgentMsg() {
  const from = document.getElementById('msg-from').value;
  const to = document.getElementById('msg-to').value;
  const text = document.getElementById('msg-text').value.trim();
  if (!text) return;
  crmQuery('send-message', from, to, text);
  addFeedEntry(from, `to ${to}: "${text}"`);
  document.getElementById('msg-text').value = '';

  // If target agent has a CLI, dispatch the message
  const targetAgent = agents.find(a => a.name === to);
  if (targetAgent) {
    targetAgent.chatBubble = `msg from ${from}`;
    targetAgent.chatTimer = 3;
  }
  refreshMessages();
}

function refreshMessages() {
  const el = document.getElementById('agent-messages');
  if (!el) return;
  try {
    // Get all recent messages
    const msgs = JSON.parse(execSync(`python3 "${DB_PY}" query "SELECT * FROM agent_messages ORDER BY created_at DESC LIMIT 15"`, { encoding: 'utf-8', timeout: 3000 }));
    if (Array.isArray(msgs)) {
      el.innerHTML = msgs.map(m => {

        return `<div class="msg-bubble">
          <span class="from" style="color:${fromAgent?fromAgent.color:'#888'}">${m.from_agent}</span>
          <span style="color:#444">-></span>
          <span style="color:${toAgent?toAgent.color:'#888'}">${m.to_agent}</span>:

  } catch(e) {}
}

  outEl.textContent = 'Running...';

  try {
