// ===== AGENT DAEMONS =====
const DAEMON_FILE = path.join(os.homedir(), 'agent-office', 'daemons.json');
let daemonState = {};
let daemonProcesses = {}; // { agentName: spawn process }
let daemonLogs = {}; // { agentName: [log lines] }

function loadDaemonState() {
  try {
    daemonState = JSON.parse(fs.readFileSync(DAEMON_FILE, 'utf-8'));
  } catch(e) {
    daemonState = {};
    agents.forEach(a => {
      daemonState[a.name] = {
        enabled: false,
        tasks: [], // { id, text, status: 'queued'|'running'|'done'|'failed', result: '' }
        schedule: [], // { interval: minutes, prompt: text, enabled: bool, lastRun: iso }
        mode: 'task', // 'task' = work through queue, 'interactive' = ask user what to do
        context: '', // persistent context/memory for this agent
      };
    });
    saveDaemonState();
  }
  // Ensure all agents exist
  agents.forEach(a => {
    if (!daemonState[a.name]) {
      daemonState[a.name] = { enabled: false, tasks: [], schedule: [], mode: 'task', context: '' };
    }
  });
}

function saveDaemonState() {
  try { fs.writeFileSync(DAEMON_FILE, JSON.stringify(daemonState, null, 2)); } catch(e) {}
}

function addDaemonLog(agentName, text) {
  if (!daemonLogs[agentName]) daemonLogs[agentName] = [];
  const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  daemonLogs[agentName].push(`[${time}] ${text}`);
  if (daemonLogs[agentName].length > 200) daemonLogs[agentName].shift();
}

function toggleDaemon(agentName) {
  const state = daemonState[agentName];
  if (!state) return;
  state.enabled = !state.enabled;
  saveDaemonState();

  if (state.enabled) {
    addFeedEntry(agentName, 'Daemon started - ready for tasks');
    addDaemonLog(agentName, 'Daemon enabled');
    showToast(`${agentName} daemon ON`, (agents.find(a=>a.name===agentName)||{color:'#888'}).color);
    playSound('online');
    const agent = agents.find(a => a.name === agentName);
    if (agent) { agent.emote = 'wave'; agent.emoteTimer = 3; }
    // Start processing
    processDaemonQueue(agentName);
  } else {
    addFeedEntry(agentName, 'Daemon stopped');
    addDaemonLog(agentName, 'Daemon disabled');
    showToast(`${agentName} daemon OFF`, '#555');
    // Kill running process
    if (daemonProcesses[agentName]) {
      try { daemonProcesses[agentName].kill(); } catch(e) {}
      daemonProcesses[agentName] = null;
    }
  }
  renderDaemons();
}

function addDaemonTask(agentName, text) {
  if (!text || !text.trim()) return;
  const state = daemonState[agentName];
  if (!state) return;
  const task = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    text: text.trim(),
    status: 'queued',
    result: '',
    created: new Date().toISOString(),
  };
  state.tasks.push(task);
  saveDaemonState();
  addFeedEntry('System', `Task queued for ${agentName}: "${text.substring(0,40)}"`);
  addDaemonLog(agentName, `Task queued: ${text.substring(0,60)}`);

  // If daemon is on and not busy, start processing
  if (state.enabled && !daemonProcesses[agentName]) {
    processDaemonQueue(agentName);
  }
  // Re-render but restore focus
  const hadFocus = document.activeElement && document.activeElement.id === 'daemon-input-' + agentName;
  renderDaemons();
  renderKanban();
  if (hadFocus) {
    const inp = document.getElementById('daemon-input-' + agentName);
    if (inp) inp.focus();
  }
}

function removeDaemonTask(agentName, taskId) {
  const state = daemonState[agentName];
  if (!state) return;
  const task = state.tasks.find(t => t.id === taskId);
  if (task && task.status === 'running') return; // Can't remove running tasks
  state.tasks = state.tasks.filter(t => t.id !== taskId);
  saveDaemonState();
  renderDaemons();
}

function processDaemonQueue(agentName) {
  const state = daemonState[agentName];
  if (!state || !state.enabled) return;
  if (daemonProcesses[agentName]) return; // Already running something

  // Find next queued task
  const task = state.tasks.find(t => t.status === 'queued');
  if (!task) {
    addDaemonLog(agentName, 'Queue empty - waiting for tasks');
    return;
  }

  task.status = 'running';
  saveDaemonState();
  addDaemonLog(agentName, `Running: ${task.text.substring(0,60)}`);
  addFeedEntry(agentName, `Working on: "${task.text.substring(0,40)}"`);

  const agent = agents.find(a => a.name === agentName);
  if (agent) {
    agent.chatBubble = 'working...';
    agent.chatTimer = 3;
  }

  const cmd = buildDaemonCommand(agentName, task.text, state.context);
  if (!cmd) {
    task.status = 'failed';
    task.result = 'No CLI command available';
    saveDaemonState();
    addDaemonLog(agentName, 'Failed: no CLI available');
    processDaemonQueue(agentName); // Try next
    return;
  }

  const proc = spawn('bash', ['-c', cmd], {
    cwd: os.homedir(),
    env: { ...process.env, HOME: os.homedir() },
  });
  daemonProcesses[agentName] = proc;

  let output = '';
  let errOutput = '';

  proc.stdout.on('data', data => { output += data.toString(); });
  proc.stderr.on('data', data => { errOutput += data.toString(); });

  proc.on('close', code => {
    daemonProcesses[agentName] = null;
    const result = (output.trim() || errOutput.trim() || '(no output)').substring(0, 3000);

    task.status = code === 0 ? 'done' : 'failed';
    task.result = result;
    saveDaemonState();

    addDaemonLog(agentName, `${task.status === 'done' ? 'Completed' : 'Failed'}: ${task.text.substring(0,40)}`);
    addDaemonLog(agentName, `Output: ${result.substring(0,100)}`);
    addFeedEntry(agentName, `${task.status === 'done' ? 'Finished' : 'Failed'}: "${task.text.substring(0,40)}"`);

    if (agent) {
      agent.chatBubble = task.status === 'done' ? 'done!' : 'failed :(';
      agent.chatTimer = 2;
      if (task.status === 'done') { spawnConfetti(agent.x, agent.y, 12); agent.tasksCompleted++; }
    }
    playSound('ding');

    // Save result as agent message
    try { crmQuery('send-message', agentName, 'System', `[daemon] ${task.text.substring(0,50)}: ${result.substring(0,200)}`); } catch(e) {}

    renderDaemons();
    renderKanban();

    // Process next task after a short delay
    if (state.enabled) {
      setTimeout(() => processDaemonQueue(agentName), 2000);
    }
  });

  proc.on('error', err => {
    daemonProcesses[agentName] = null;
    task.status = 'failed';
    task.result = err.message;
    saveDaemonState();
    addDaemonLog(agentName, `Error: ${err.message}`);
    if (state.enabled) setTimeout(() => processDaemonQueue(agentName), 5000);
    renderDaemons();
  });

  // Timeout after 5 minutes for daemon tasks
  setTimeout(() => {
    if (daemonProcesses[agentName] === proc) {
      try { proc.kill(); } catch(e) {}
      daemonProcesses[agentName] = null;
      task.status = 'failed';
      task.result = output.substring(0, 500) || 'Timed out (5 min)';
      saveDaemonState();
      addDaemonLog(agentName, 'Task timed out');
      if (state.enabled) setTimeout(() => processDaemonQueue(agentName), 2000);
      renderDaemons();
    }
  }, 300000);

  renderDaemons();
}

function buildDaemonCommand(agentName, prompt, context) {
  const escaped = prompt.replace(/"/g, '\\"').replace(/\$/g, '\\$').replace(/`/g, '\\`');
  const ctxPrefix = context ? `Context: ${context.substring(0,200).replace(/"/g,'\\"')}. Task: ` : '';
  const full = ctxPrefix + escaped;
  switch(agentName) {
    case 'Claude': return `claude -p "${full}" --yolo 2>&1`;
    case 'Gemini': return `gemini -p "${full}" --yolo -o text 2>&1`;
    case 'Codex': return `codex exec "${full}" 2>&1`;
    case 'Cursor': return `agent -p "${full}" --yolo --output-format text 2>&1`;
    case 'Qwen': return `qwen -p "${full}" --yolo 2>&1`;
    default: return null;
  }
}

// Scheduled tasks
function checkDaemonSchedules() {
  const now = new Date();
  agents.forEach(a => {
    const state = daemonState[a.name];
    if (!state || !state.enabled) return;
    (state.schedule || []).forEach(sched => {
      if (!sched.enabled) return;
      const lastRun = sched.lastRun ? new Date(sched.lastRun) : new Date(0);
      const elapsed = (now - lastRun) / 60000; // minutes
      if (elapsed >= sched.interval) {
        sched.lastRun = now.toISOString();
        addDaemonTask(a.name, sched.prompt);
        addDaemonLog(a.name, `Scheduled task triggered: ${sched.prompt.substring(0,40)}`);
        saveDaemonState();
      }
    });
  });
}
setInterval(checkDaemonSchedules, 30000); // Check every 30s

function addDaemonSchedule(agentName) {
  const interval = prompt('Run every X minutes:');
  if (!interval || isNaN(interval)) return;
  const promptText = prompt('What should the agent do each time?');
  if (!promptText) return;
  const state = daemonState[agentName];
  if (!state) return;
  if (!state.schedule) state.schedule = [];
  state.schedule.push({
    interval: parseInt(interval),
    prompt: promptText,
    enabled: true,
    lastRun: null,
  });
  saveDaemonState();
  addFeedEntry('System', `Scheduled: ${agentName} every ${interval}min - "${promptText.substring(0,30)}"`);
  renderDaemons();
}

function toggleSchedule(agentName, idx) {
  const state = daemonState[agentName];
  if (!state || !state.schedule[idx]) return;
  state.schedule[idx].enabled = !state.schedule[idx].enabled;
  saveDaemonState();
  renderDaemons();
}

function removeSchedule(agentName, idx) {
  const state = daemonState[agentName];
  if (!state) return;
  state.schedule.splice(idx, 1);
  saveDaemonState();
  renderDaemons();
}

function setDaemonContext(agentName) {
  const state = daemonState[agentName];
  if (!state) return;
  const ctx = prompt('Set context/memory for this agent (e.g., "You are a research assistant focused on AI papers"):', state.context || '');
  if (ctx === null) return;
  state.context = ctx;
  saveDaemonState();
  addDaemonLog(agentName, `Context updated: ${ctx.substring(0,60)}`);
  renderDaemons();
}

function clearDaemonDone(agentName) {
  const state = daemonState[agentName];
  if (!state) return;
  state.tasks = state.tasks.filter(t => t.status === 'queued' || t.status === 'running');
  saveDaemonState();
  renderDaemons();
}

function daemonAddFromInput(agentName) {
  const input = document.getElementById('daemon-input-' + agentName);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  addDaemonTask(agentName, val);
}

// Only Gemini and Qwen can run as persistent daemons
const DAEMON_AGENTS = ['Gemini', 'Qwen'];

function renderDaemons() {
  const el = document.getElementById('panel-daemons');
  if (!el) return;

  el.innerHTML = `
    <div style="font-size:10px;color:#555;margin-bottom:8px;display:flex;justify-content:space-between">
      <span>Always-On Workers</span>
      <span style="color:#0f8">${Object.values(daemonState).filter(s=>s.enabled).length} active</span>
    </div>
    <div style="font-size:9px;color:#444;margin-bottom:10px;padding:5px 8px;background:#1a1a2e;border-radius:4px;border-left:2px solid #333">
      Gemini + Qwen run 24/7. Claude, Codex, Cursor are project-time only — use Chat to talk to them.
    </div>
    ${agents.filter(a => DAEMON_AGENTS.includes(a.name)).map(a => {
      const state = daemonState[a.name] || { enabled: false, tasks: [], schedule: [], context: '' };
      const isRunning = !!daemonProcesses[a.name];
      const queued = state.tasks.filter(t => t.status === 'queued').length;
      const done = state.tasks.filter(t => t.status === 'done').length;
      const failed = state.tasks.filter(t => t.status === 'failed').length;
      const running = state.tasks.find(t => t.status === 'running');
      const logs = (daemonLogs[a.name] || []).slice(-8);

      return `
        <div class="daemon-card ${state.enabled ? 'running' : ''}" style="border-left-color:${state.enabled ? a.color : '#333'}">
          <div class="daemon-header">
            <div style="width:8px;height:8px;border-radius:50%;background:${state.enabled ? a.color : '#333'}${isRunning ? ';animation:pd 1.5s infinite' : ''}"></div>
            <span class="daemon-name" style="color:${a.color}">${a.name}</span>
            <span style="font-size:8px;color:${a.deptColor};opacity:0.6">${a.dept}</span>
            <span class="daemon-status ${state.enabled ? 'on' : 'off'}">${
              isRunning ? 'WORKING' : state.enabled ? 'READY' : 'OFF'
            }</span>
            <div class="daemon-toggle ${state.enabled ? 'on' : ''}" onclick="toggleDaemon('${a.name}')">
              <div class="knob"></div>
            </div>
          </div>

          ${state.context ? `<div style="font-size:9px;color:#555;margin-bottom:4px;font-style:italic">"${esc(state.context.substring(0,60))}"</div>` : ''}

          <div style="font-size:9px;color:#444;margin-bottom:4px">
            ${queued} queued | ${done} done | ${failed} failed
            ${running ? ` | <span style="color:${a.color}">Running: ${esc(running.text.substring(0,30))}</span>` : ''}
          </div>

          <div class="daemon-task-input">
            <input type="text" id="daemon-input-${a.name}" placeholder="Assign a task to ${a.name}..."
              onkeydown="if(event.key==='Enter'){daemonAddFromInput('${a.name}');}">
            <button onclick="daemonAddFromInput('${a.name}')">Add</button>
          </div>

          ${state.tasks.map(t => `
            <div class="daemon-queue-item" style="${(t.status==='done'||t.status==='failed')?'opacity:0.6':''}">
              <div class="dq-status" style="background:${t.status === 'running' ? a.color : t.status === 'done' ? '#0f8' : t.status === 'failed' ? '#f55' : '#555'}"></div>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.text)}</span>
              <span style="color:${t.status === 'running' ? a.color : t.status === 'done' ? '#0f8' : t.status === 'failed' ? '#f55' : '#555'};font-size:8px;flex-shrink:0">${t.status}</span>
              ${t.status !== 'running' ? `<span class="dq-remove" onclick="removeDaemonTask('${a.name}','${t.id}')">x</span>` : ''}
            </div>
            ${t.result ? `<div style="font-size:8px;color:#555;padding:2px 0 2px 18px;max-height:40px;overflow-y:auto;word-break:break-all;cursor:pointer" onclick="this.style.maxHeight=this.style.maxHeight==='none'?'40px':'none'">${esc(t.result.substring(0,500))}</div>` : ''}
          `).join('')}

          <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
            <button class="auto-btn" style="width:auto;padding:3px 8px;font-size:9px" onclick="setDaemonContext('${a.name}')">Set Context</button>
            <button class="auto-btn" style="width:auto;padding:3px 8px;font-size:9px" onclick="addDaemonSchedule('${a.name}')">+ Schedule</button>
            <button class="auto-btn" style="width:auto;padding:3px 8px;font-size:9px" onclick="clearDaemonDone('${a.name}')">Clear Done</button>
            <button class="auto-btn" style="width:auto;padding:3px 8px;font-size:9px" onclick="openChatPanel('${a.name}')">Chat</button>
          </div>

          ${(state.schedule || []).length ? `
            <div style="margin-top:6px">
              <div style="font-size:8px;color:#555;margin-bottom:3px">SCHEDULED</div>
              ${state.schedule.map((s, i) => `
                <div class="daemon-schedule">
                  <span class="${s.enabled ? 'sched-active' : 'sched-inactive'}" style="cursor:pointer" onclick="toggleSchedule('${a.name}',${i})">${s.enabled ? 'ON' : 'OFF'}</span>
                  <span style="color:#888">Every ${s.interval}m:</span>
                  <span style="color:#aaa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.prompt.substring(0,40))}</span>
                  <span style="color:#555;cursor:pointer;font-size:8px" onclick="removeSchedule('${a.name}',${i})">x</span>
                </div>
              `).join('')}
            </div>
          ` : ''}

          ${logs.length ? `
            <div class="daemon-log">${logs.join('\n')}</div>
          ` : ''}
        </div>
      `;
    }).join('')}

    <div style="margin-top:10px;padding:8px;background:#1a1a2e;border-radius:4px">
      <div style="font-size:10px;color:#666;margin-bottom:6px">Quick Batch</div>
      <button class="auto-btn" onclick="batchAssign()">Assign Task to Active Daemons</button>
      <button class="auto-btn" onclick="stopAllDaemons()">Stop All Daemons</button>
    </div>

    <div style="margin-top:12px">
      <div style="font-size:10px;color:#555;margin-bottom:6px;border-bottom:1px solid #1a1a2e;padding-bottom:4px">Project-Time Agents (on-demand only)</div>
      ${agents.filter(a => !DAEMON_AGENTS.includes(a.name)).map(a => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1a1a2e;border-radius:4px;margin-bottom:4px;border-left:2px solid ${a.active ? a.color : '#333'}">
          <div style="width:7px;height:7px;border-radius:50%;background:${a.active ? a.color : '#333'}"></div>
          <span style="color:${a.color};font-size:11px;font-weight:bold">${a.name}</span>
          <span style="font-size:8px;color:#444">${a.dept}</span>
          <span style="font-size:8px;color:${a.active ? '#0f8' : '#555'};margin-left:auto">${a.active ? 'RUNNING' : 'idle'}</span>
          <button class="auto-btn" style="width:auto;padding:2px 8px;font-size:9px;margin:0" onclick="openChatPanel('${a.name}')">Chat</button>
        </div>
      `).join('')}
    </div>
  `;
}

function batchAssign() {
  const text = prompt('Task for all active daemons (Gemini + Qwen):');
  if (!text) return;
  DAEMON_AGENTS.forEach(name => {
    if (daemonState[name] && daemonState[name].enabled) {
      addDaemonTask(name, text);
    }
  });
}

function stopAllDaemons() {
  DAEMON_AGENTS.forEach(name => {
    if (daemonState[name] && daemonState[name].enabled) {
      daemonState[name].enabled = false;
      if (daemonProcesses[name]) {
        try { daemonProcesses[name].kill(); } catch(e) {}
        daemonProcesses[name] = null;
      }
    }
  });
  saveDaemonState();
  addFeedEntry('System', 'All daemons stopped');
  renderDaemons();
}

// Load daemon state on startup
loadDaemonState();

// ===== CHAT PANELS =====
const chatPanels = {}; // { agentName: { el, messages, process, busy } }
let chatPanelZIndex = 200;

function openChatPanel(agentName) {
  if (chatPanels[agentName]) {
    // Already open, bring to front
    chatPanels[agentName].el.style.zIndex = ++chatPanelZIndex;
    chatPanels[agentName].el.querySelector('input').focus();
    return;
  }
  const agent = agents.find(a => a.name === agentName);
  if (!agent) return;

  const panelCount = Object.keys(chatPanels).length;
  const offsetX = 80 + panelCount * 30;
  const offsetY = 60 + panelCount * 30;

  const panel = document.createElement('div');
  panel.className = 'chat-panel';
  panel.style.left = offsetX + 'px';
  panel.style.top = offsetY + 'px';
  panel.style.borderColor = agent.color + '88';
  panel.style.zIndex = ++chatPanelZIndex;
  panel.innerHTML = `
    <div class="chat-panel-header" style="background:${agent.color}15;border-bottom:1px solid ${agent.color}33">
      <div class="dot" style="background:${agent.color}"></div>
      <span class="title" style="color:${agent.color}">${agent.name}</span>
      <span class="status-text">${agent.dept} | ${agent.active ? 'online' : 'idle'}</span>
      <span class="close" onclick="closeChatPanel('${agentName}')">&times;</span>
    </div>
    <div class="chat-panel-body" id="chat-body-${agentName}"></div>
    <div class="chat-panel-input">
      <input type="text" id="chat-input-${agentName}" placeholder="Talk to ${agentName}..." onkeydown="if(event.key==='Enter')sendChatMsg('${agentName}')">
      <button onclick="sendChatMsg('${agentName}')">Send</button>
    </div>
  `;
  document.body.appendChild(panel);

  // Dragging
  const header = panel.querySelector('.chat-panel-header');
  let dragX, dragY, isDragging = false;
  header.addEventListener('mousedown', e => {
    isDragging = true;
    dragX = e.clientX - panel.offsetLeft;
    dragY = e.clientY - panel.offsetTop;
    panel.style.zIndex = ++chatPanelZIndex;
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    panel.style.left = Math.max(0, e.clientX - dragX) + 'px';
    panel.style.top = Math.max(0, e.clientY - dragY) + 'px';
  });
  document.addEventListener('mouseup', () => { isDragging = false; });

  // Focus on click
  panel.addEventListener('mousedown', () => { panel.style.zIndex = ++chatPanelZIndex; });

  chatPanels[agentName] = { el: panel, messages: [], process: null, busy: false };

  addChatMessage(agentName, 'system', `Chat with ${agentName} started. Type a message to send via CLI.`);
  addChatMessage(agentName, 'system', getCLIHint(agentName));

  addFeedEntry('System', `Opened chat with ${agentName}`);
  playSound('online');

  setTimeout(() => panel.querySelector('input').focus(), 100);
}

function getCLIHint(name) {
  switch(name) {
    case 'Claude': return 'Claude responses via: claude -p "..." --yolo';
    case 'Gemini': return 'Gemini responses via: gemini -p "..." --yolo -o text';
    case 'Codex': return 'Codex responses via: codex exec "..."';
    case 'Cursor': return 'Cursor responses via: agent -p "..." --yolo';
    case 'Qwen': return 'Qwen responses via: qwen -p "..." --yolo';
    default: return '';
  }
}

function closeChatPanel(agentName) {
  const cp = chatPanels[agentName];
  if (!cp) return;
  if (cp.process) {
    try { cp.process.kill(); } catch(e) {}
  }
  cp.el.remove();
  delete chatPanels[agentName];
  addFeedEntry('System', `Closed chat with ${agentName}`);
}

function addChatMessage(agentName, type, text) {
  const cp = chatPanels[agentName];
  if (!cp) return;
  const agent = agents.find(a => a.name === agentName);
  const body = cp.el.querySelector('.chat-panel-body');

  const msg = document.createElement('div');
  msg.className = 'chat-msg ' + type;
  if (type === 'agent') {
    msg.innerHTML = `<div class="agent-label" style="color:${agent?agent.color:'#888'}">${agentName}</div>${escChat(text)}`;
  } else if (type === 'user') {
    msg.textContent = text;
  } else {
    msg.textContent = text;
  }
  body.appendChild(msg);
  cp.messages.push({ type, text, time: Date.now() });

  // Auto-scroll
  body.scrollTop = body.scrollHeight;

  // Remove typing indicator if present
  const typing = body.querySelector('.chat-typing');
  if (typing && type !== 'typing') typing.remove();
}

function escChat(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTypingIndicator(agentName) {
  const cp = chatPanels[agentName];
  if (!cp) return;
  const body = cp.el.querySelector('.chat-panel-body');
  if (body.querySelector('.chat-typing')) return;
  const agent = agents.find(a => a.name === agentName);
  const el = document.createElement('div');
  el.className = 'chat-typing';
  el.innerHTML = `<span style="color:${agent?agent.color:'#888'}">${agentName}</span> is thinking<span class="dots"></span>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
}

function removeTypingIndicator(agentName) {
  const cp = chatPanels[agentName];
  if (!cp) return;
  const typing = cp.el.querySelector('.chat-typing');
  if (typing) typing.remove();
}

function setInputEnabled(agentName, enabled) {
  const cp = chatPanels[agentName];
  if (!cp) return;
  const input = cp.el.querySelector('input');
  const btn = cp.el.querySelector('button');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  cp.busy = !enabled;
  // Update status text
  const statusEl = cp.el.querySelector('.status-text');
  if (statusEl) {
    const agent = agents.find(a => a.name === agentName);
    statusEl.textContent = enabled
      ? `${agent?agent.dept:''} | ${agent&&agent.active?'online':'idle'}`
      : 'responding...';
  }
}

function sendChatMsg(agentName) {
  const cp = chatPanels[agentName];
  if (!cp || cp.busy) return;
  const input = cp.el.querySelector('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addChatMessage(agentName, 'user', text);
  addFeedEntry('You', `to ${agentName}: "${text.substring(0,40)}"`);

  // Build CLI command
  const cmd = buildChatCommand(agentName, text);
  if (!cmd) {
    addChatMessage(agentName, 'system', 'No CLI command available for this agent.');
    return;
  }

  setInputEnabled(agentName, false);
  showTypingIndicator(agentName);

  // Spawn async process
  const proc = spawn('bash', ['-c', cmd.command], {
    cwd: os.homedir(),
    env: { ...process.env, HOME: os.homedir() },
  });

  cp.process = proc;
  let output = '';
  let errorOutput = '';

  proc.stdout.on('data', data => {
    output += data.toString();
  });

  proc.stderr.on('data', data => {
    errorOutput += data.toString();
  });

  proc.on('close', code => {
    removeTypingIndicator(agentName);
    cp.process = null;

    const result = output.trim() || errorOutput.trim() || '(no response)';
    // Limit output length
    const truncated = result.length > 3000 ? result.substring(0, 3000) + '\n... (truncated)' : result;

    addChatMessage(agentName, 'agent', truncated);
    setInputEnabled(agentName, true);

    const agent = agents.find(a => a.name === agentName);
    if (agent) {
      agent.chatBubble = text.substring(0, 20) + '...';
      agent.chatTimer = 3;
      agent.terminalLines.push({ text: `[chat] ${text.substring(0,40)}`, type: 'cmd' });
      agent.terminalLines.push({ text: result.substring(0, 80), type: 'output' });
      if (agent.terminalLines.length > 50) agent.terminalLines.splice(0, agent.terminalLines.length - 50);
    }

    addFeedEntry(agentName, `replied: "${result.substring(0, 60)}"`);
    playSound('ding');
    renderTerminals();

    // Save conversation to DB
    try {
      crmQuery('send-message', 'User', agentName, text.substring(0, 200));
      crmQuery('send-message', agentName, 'User', result.substring(0, 500));
    } catch(e) {}

    // Focus input for next message
    setTimeout(() => {
      const inp = cp.el?.querySelector('input');
      if (inp) inp.focus();
    }, 100);
  });

  proc.on('error', err => {
    removeTypingIndicator(agentName);
    cp.process = null;
    addChatMessage(agentName, 'system', `Error: ${err.message}`);
    setInputEnabled(agentName, true);
  });

  // Timeout after 2 minutes
  setTimeout(() => {
    if (cp.process === proc) {
      try { proc.kill(); } catch(e) {}
      removeTypingIndicator(agentName);
      if (!output.trim()) addChatMessage(agentName, 'system', 'Timed out after 2 minutes.');
      setInputEnabled(agentName, true);
    }
  }, 120000);
}

function buildChatCommand(agentName, prompt) {
  const escaped = prompt.replace(/"/g, '\\"').replace(/\$/g, '\\$').replace(/`/g, '\\`');
  switch(agentName) {
    case 'Claude': return { command: `claude -p "${escaped}" --yolo 2>&1` };
    case 'Gemini': return { command: `gemini -p "${escaped}" --yolo -o text 2>&1` };
    case 'Codex': return { command: `codex exec "${escaped}" 2>&1` };
    case 'Cursor': return { command: `agent -p "${escaped}" --yolo --output-format text 2>&1` };
    case 'Qwen': return { command: `qwen -p "${escaped}" --yolo 2>&1` };
    default: return null;
  }
}

// ===== MAIN LOOP =====
let lastMove=0,lastScan=0,lastTerm=0,lastUI=0,prevTS=0,ambientSoundTimer=0;

function drawRoom(time) {
  const furn = currentRoom==='server'?serverRoomFurniture:currentRoom==='break'?breakRoomFurniture:currentRoom==='datalab'?dataLabFurniture:furniture;
  if(currentRoom!=='office')buildCollision(furn);

  drawFloor();
  drawFootsteps();

  // Windows
  furn.filter(f=>f.type==='window').forEach(f=>drawWindow(f.x,f.y,f.w||1));
  furn.filter(f=>f.type==='poster').forEach(f=>drawPoster(f.x,f.y,f.color,f.label));
  furn.filter(f=>f.type==='wallclock').forEach(f=>drawWallClock(f.x,f.y));
  furn.filter(f=>f.type==='rug').forEach(f=>drawRug(f.x,f.y,f.w,f.h));
  furn.forEach(f=>{
    switch(f.type){
      case'desk':drawDesk(f.x,f.y,f.w);break;case'plant':drawPlant(f.x,f.y);break;
      case'whiteboard':drawWhiteboard(f.x,f.y,f.w,f.h,time);break;
      case'coffee':drawCoffee(f.x,f.y);break;case'water':drawWater(f.x,f.y);break;
      case'bookshelf':drawBookshelf(f.x,f.y,f.w,f.h);break;
      case'couch':drawCouch(f.x,f.y,f.w,f.h);break;case'lamp':drawLamp(f.x,f.y);break;
      case'rack':drawRack(f.x,f.y,f.w,f.h);break;case'tv':drawTV(f.x,f.y,f.w,f.h,time);break;
      case'arcade':drawArcade(f.x,f.y,time);break;case'bigtable':drawBigTable(f.x,f.y,f.w,f.h);break;
    }
  });

  if(currentRoom==='office'){
    drawDeptSign(4,6,3,'LEAD DEV',agents[0].color);
    drawDeptSign(13,6,3,'RESEARCH',agents[1].color);
    drawDeptSign(22,6,3,'BACKEND',agents[2].color);
    drawDeptSign(8,13,3,'FRONTEND',agents[3].color);
    drawDeptSign(17,16,3,'DATA LAB',agents[4].color);
  }
}

function gameLoop(ts){
  const time=ts/1000,dt=Math.min(0.1,(ts-prevTS)/1000);prevTS=ts;

  if(ts-lastScan>4000){scanProcesses();lastScan=ts;}
  if(ts-lastTerm>8000){captureTerminals();lastTerm=ts;}
  if(ts-lastUI>2000){renderAgentCards();renderStats();lastUI=ts;}

  // Ambient sound
  if(soundEnabled){ambientSoundTimer+=dt;if(ambientSoundTimer>8){playSound('ambient');ambientSoundTimer=0;}}

  const now=new Date(),h=now.getHours();
  clockEl.textContent=`${now.toLocaleTimeString()} | ${currentRoom} | ${weather.type}`;

  if(ts-lastMove>150){
    agents.forEach(a=>{updateAgentBehavior(a);if(a.targetX!==a.x||a.targetY!==a.y)moveTowards(a);if(a.chatTimer>0)a.chatTimer-=0.12;if(a.delegateTimer>0)a.delegateTimer-=0.015;else a.delegatedTo=null;if(a.emoteTimer>0)a.emoteTimer-=0.08;});
    if(currentRoom==='office')buildCollision(furniture);
    lastMove=ts;
  }

  updateCat(dt);
  updateVisitors(dt);
  updateParts(dt);
  tryStartConversation(time);
  updateConversation(dt);

  // Draw
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoom(time);

  if(currentRoom==='office'){
    [...agents].sort((a,b)=>a.y-b.y).forEach(a=>drawAgent(a,time));
    drawCat(time);
    visitors.forEach(v=>drawVisitor(v,time));
  }

  drawParts();
  drawAmbient(time);
  drawWeather(time);

  const dn=getDN();
  if(dn.ov){ctx.fillStyle=dn.ov;ctx.fillRect(0,0,canvas.width,canvas.height);}

  ctx.font=`bold ${10*SCALE}px monospace`;ctx.fillStyle='rgba(255,255,255,0.06)';
  const roomLabel=currentRoom==='office'?'AGENT OFFICE':currentRoom==='server'?'SERVER ROOM':currentRoom==='datalab'?'DATA LAB':'BREAK ROOM';
  ctx.fillText(roomLabel,10*SCALE,(ROWS*TILE-4)*SCALE);

  drawMinimap();
  requestAnimationFrame(gameLoop);
}

// Init
loadTaskQueue();
scanProcesses();renderAgentCards();renderFeed();renderTerminals();renderStats();renderKanban();renderAuto();
addFeedEntry('System','Agent Office v7 loaded - Daemons + Chat');
addFeedEntry('System','Click agents to chat | Agents tab for daemon controls');
addFeedEntry('System',`Commander: ${getCommander()}`);
addFeedEntry('System','Cat joined the office');
// Resume daemons that were enabled (Gemini + Qwen only)
DAEMON_AGENTS.forEach(name => {
  if (daemonState[name] && daemonState[name].enabled) {
    addFeedEntry(name, 'Daemon resumed from last session');
    addDaemonLog(name, 'Daemon resumed');
    processDaemonQueue(name);
  }
});
requestAnimationFrame(gameLoop);
</script>
